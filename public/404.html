<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirigiendo…</title>
    <script>
      (function (location) {
        var pathSegmentsToKeep = 1;
        var base = location.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
        var route = location.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/");
        location.replace(
          location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "") +
            base + "/?/" + route.replace(/&/g, "~and~") +
            (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
            location.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
